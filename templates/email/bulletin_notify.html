<!DOCTYPE html>
<html><body style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:2rem;color:#1A2B45;">
<div style="background:#0B1F3A;padding:1.5rem 2rem;border-radius:8px 8px 0 0;">
  <h1 style="color:white;margin:0;">MediMatch</h1>
</div>
<div style="background:#fff;padding:2rem;border:1px solid #D5DCE8;border-top:none;border-radius:0 0 8px 8px;">
  <h2>{{ bulletin.title }}</h2>
  <p><strong>{{ bulletin.facility.name }}</strong></p>
  {% if bulletin.event_date %}<p> {{ bulletin.event_date }}</p>{% endif %}
  <p>{{ bulletin.body }}</p>
</div>
</body></html>
