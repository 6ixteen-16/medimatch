{% if messages %}
<div style="position:fixed;top:72px;right:1.5rem;z-index:500;max-width:420px;width:100%;">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">
      <span>
        {% if message.tags == 'success' %}✓{% elif message.tags == 'error' or message.tags == 'danger' %}✕{% elif message.tags == 'warning' %}{% else %}{% endif %}
        {{ message }}
      </span>
      <button class="alert-close" aria-label="Close">×</button>
    </div>
  {% endfor %}
</div>
{% endif %}
